<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Setup Operadores</title>
    <link rel="stylesheet" href="/static/setup_operadores.css">
</head>
<body>
    <h1>Setup local - Registro de operadores</h1>

    <p>Esta pantalla debe usarse desde la laptop local conectada a la cámara.</p>

    <section>
        <h2>Datos del operador</h2>

        <input type="text" id="nombre" placeholder="Nombre completo">
        <input type="text" id="username" placeholder="Username">
        <input type="email" id="correo" placeholder="Correo">

        <select id="rol">
            <option value="operador">Operador</option>
            <option value="admin">Admin</option>
        </select>

        <input type="password" id="password" placeholder="Contraseña para panel">
        <input type="password" id="pin" placeholder="PIN para cámara">
    </section>

    <section>
        <h2>Captura facial</h2>

        <p id="contador-rostros">Rostros capturados: 0/5</p>

        <button onclick="iniciarCamara()">Iniciar cámara</button>
        <button id="boton-tomar-rostro" onclick="tomarRostro()">Tomar foto rostro</button>
        <button onclick="cancelarCamara()">Cancelar captura</button>
    </section>

    <section>
        <button onclick="registrarOperador()">Registrar operador</button>
    </section>

    <p id="mensaje"></p>

    <script src="/static/setup_operadores.js?v=4"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bitácora SITE</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f4f4f4; }
        h1 { color: #333; }
        table { border-collapse: collapse; width: 100%; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #2c3e50; color: white; }
        tr:nth-child(even) { background: #f9f9f9; }
    </style>
</head>
<body>
    <h1>Personas dentro del SITE</h1>
    <table>
        <thead>
            <tr>
                <th>ID Visita</th>
                <th>Nombre</th>
                <th>Fecha</th>
                <th>Hora entrada</th>
            </tr>
        </thead>
        <tbody id="tabla-adentro"></tbody>
    </table>
    <h1>Historial de visitas</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Fecha</th>
                <th>Nombre</th>
                <th>Entrada</th>
                <th>Salida</th>
                <th>Tipo</th>
                <th>Autorizó</th>
            </tr>
        </thead>
        <tbody id="tabla-historial"></tbody>
    </table>

    <script>
        async function cargarAdentro() {
            const respuesta = await fetch('/adentro');
            const datos = await respuesta.json();
            const tbody = document.getElementById('tabla-adentro');
            tbody.innerHTML = '';
            for (const visita of datos.adentro) {
                const fila = document.createElement('tr');
                fila.innerHTML = `
                    <td>${visita[0]}</td>
                    <td>${visita[1]}</td>
                    <td>${visita[2]}</td>
                    <td>${visita[3]}</td>
                `;
                tbody.appendChild(fila);
            }
        }
        cargarAdentro();
        async function cargarHistorial() {
            const respuesta = await fetch('/visitas');
            const datos = await respuesta.json();
            const tbody = document.getElementById('tabla-historial');
            tbody.innerHTML = '';
            for (const v of datos.visitas) {
                const fila = document.createElement('tr');
                fila.innerHTML = `
                    <td>${v[0]}</td>
                    <td>${v[1]}</td>
                    <td>${v[2]}</td>
                    <td>${v[3]}</td>
                    <td>${v[4] || '—'}</td>
                    <td>${v[5]}</td>
                    <td>${v[6]}</td>
                `;
                tbody.appendChild(fila);
            }
        }
        cargarHistorial();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bitácora SITE</title>
    <link rel="stylesheet" href="/static/panel.css">
</head>
<body>
    <button id="boton-recarga" onclick="actualizar_todo()">Actualizar</button>
    <button onclick="cerrarSesion()">Cerrar sesión</button>
    <button onclick="window.location.href='/admin'">Panel Admin</button>
    <h2>Subir nuevo reglamento</h2>
<form id="form-reglamento">
    <input type="text" id="nombre-version" placeholder="Nombre de versión" required>
    <input type="file" id="archivo-reglamento" accept="application/pdf" required>
    <button type="submit">Subir reglamento</button>
    
</form>

<p id="mensaje-reglamento"></p>
    <h1>Personas dentro del SITE</h1>
    <table>
        <thead>
            <tr>
                <th>ID Visita</th>
                <th>Nombre</th>
                <th>Fecha</th>
                <th>Hora entrada</th>
            </tr>
        </thead>
        <tbody id="tabla-adentro"></tbody>
    </table>
    <h1>Historial de visitas</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Fecha</th>
                <th>Nombre</th>
                <th>Tipo Persona</th>
                <th>Entrada</th>
                <th>Salida</th>
                <th>Tipo Entrada</th>
                <th>Autorizó</th>
                <th>Op. Entrada</th>
                <th>Op. Salida</th>
            </tr>
        </thead>
        <tbody id="tabla-historial"></tbody>
    </table>
    <h1>Auditoría</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Usuario</th>
                <th>Fecha</th>
                <th>Hora</th>
                <th>Accion</th>
                <th>Tabla</th>
                <th>Registro</th>
            </tr>
        </thead>
        <tbody id="tabla-auditoria"></tbody>
    </table>
    <script src="/static/auth.js"></script>
    <script src="/static/panel.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bitácora SITE</title>
    <link rel="stylesheet" href="/static/panel.css">
</head>
<body>
    <h1>Personas dentro del SITE</h1>
    <table>
        <thead>
            <tr>
                <th>ID Visita</th>
                <th>Nombre</th>
                <th>Fecha</th>
                <th>Hora entrada</th>
            </tr>
        </thead>
        <tbody id="tabla-adentro"></tbody>
    </table>
    <h1>Historial de visitas</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Fecha</th>
                <th>Nombre</th>
                <th>Entrada</th>
                <th>Salida</th>
                <th>Tipo</th>
                <th>Autorizó</th>
            </tr>
        </thead>
        <tbody id="tabla-historial"></tbody>
    </table>
    <script src="/static/panel.js"></script>
</body>
</html>
